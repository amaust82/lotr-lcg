<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600">
  <defs>
    <filter id="crim" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <!-- Very large organic blobs: plaster, concrete, dried pigment -->
      <feTurbulence type="fractalNoise" baseFrequency="0.06 0.04" numOctaves="5"
                    seed="7" stitchTiles="stitch" result="large"/>
      <!-- Mid-scale roughness: surface cracks, uneven dye penetration -->
      <feTurbulence type="fractalNoise" baseFrequency="0.22 0.18" numOctaves="3"
                    seed="31" stitchTiles="stitch" result="mid"/>
      <!-- Mix: mostly large blobs with mid-scale detail -->
      <feComposite in="large" in2="mid" operator="arithmetic"
                   k1="0" k2="0.65" k3="0.35" k4="0" result="mixed"/>
      <!-- Keep as grayscale — blend mode handles color tinting -->
      <feColorMatrix type="saturate" values="0" in="mixed"/>
    </filter>
  </defs>
  <rect width="600" height="600" filter="url(#crim)"/>
</svg>
