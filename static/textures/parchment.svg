<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <defs>
    <filter id="parch" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <!-- Large aging stains: very low frequency, high octaves for depth -->
      <feTurbulence type="fractalNoise" baseFrequency="0.022 0.015" numOctaves="6"
                    seed="29" stitchTiles="stitch" result="stain"/>
      <!-- Paper fiber direction: x >> y gives horizontal grain like laid paper -->
      <feTurbulence type="fractalNoise" baseFrequency="0.30 0.06" numOctaves="4"
                    seed="11" stitchTiles="stitch" result="fiber"/>
      <!-- Weighted: 35% aging, 65% fiber -->
      <feComposite in="stain" in2="fiber" operator="arithmetic"
                   k1="0" k2="0.35" k3="0.65" k4="0" result="paper"/>
      <!-- Compress range toward near-white warm tones.
           Output: R≈[0.82,0.97] G≈[0.78,0.92] B≈[0.68,0.80]
           Gives a warm paper tone with subtle variation. -->
      <feColorMatrix type="matrix" in="paper"
        values="0.14 0.08 0.04 0 0.80
                0.10 0.08 0.04 0 0.74
                0.06 0.04 0.06 0 0.62
                0    0    0    0 0.80"/>
    </filter>
  </defs>
  <rect width="512" height="512" filter="url(#parch)"/>
</svg>
