<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <defs>
    <filter id="stone" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <!-- Coarse: large surface cracks and uneven weathering -->
      <feTurbulence type="fractalNoise" baseFrequency="0.10 0.07" numOctaves="5"
                    seed="17" stitchTiles="stitch" result="coarse"/>
      <!-- Fine: surface grit and pitting -->
      <feTurbulence type="fractalNoise" baseFrequency="0.82 0.78" numOctaves="3"
                    seed="43" stitchTiles="stitch" result="fine"/>
      <!-- Weighted mix: 40% coarse variation, 60% fine grain -->
      <feComposite in="coarse" in2="fine" operator="arithmetic"
                   k1="0" k2="0.40" k3="0.60" k4="0" result="mixed"/>
      <!-- Desaturate to clean grayscale stone -->
      <feColorMatrix type="saturate" values="0" in="mixed"/>
    </filter>
  </defs>
  <rect width="512" height="512" filter="url(#stone)"/>
</svg>
